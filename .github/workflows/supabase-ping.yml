name: Keep Supabase Alive
on:
  schedule:
    - cron: '0 12 */5 * *'   # Every 5 days at noon UTC
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/rooms?select=id&limit=1" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
